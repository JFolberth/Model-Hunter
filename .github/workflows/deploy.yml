name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build, Test, Lint (reusable) ──
  build:
    name: Build
    uses: ./.github/workflows/_build.yml

  # ── Deploy to Dev (auto) ──
  deploy-dev:
    name: Deploy Dev
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      environment: dev
      tf_var_file: env/dev.tfvars
      tf_state_key: model-hunter-dev.tfstate

  # ── Deploy to Prod (manual approval via GitHub Environment) ──
  deploy-prod:
    name: Deploy Prod
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      environment: prod
      tf_var_file: env/prod.tfvars
      tf_state_key: model-hunter-prod.tfstate
