name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  # ── Build, Test, Lint (reusable) ──
  build:
    name: Build
    uses: ./.github/workflows/_build.yml

  # ── Terraform Plan (dev) ──
  plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    environment: dev

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-terraformstate-dev-eus" \
            -backend-config="storage_account_name=saterraformstatedeveus" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=model-hunter-dev.tfstate"

      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan \
            -var-file="env/dev.tfvars" \
            -var="target_subscription_ids=${{ vars.TARGET_SUBSCRIPTION_IDS }}"

  # ── CodeQL (PowerShell) ──
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── Terraform Security Scan ──
  tfsec:
    name: Terraform Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true
