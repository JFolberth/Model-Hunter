name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build, Test, Lint (reusable) ──
  build:
    name: Build
    uses: ./.github/workflows/_build.yml

  # ── Terraform Plan (dev) ──
  plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    environment: dev

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-terraformstate-dev-eus" \
            -backend-config="storage_account_name=saterraformstatedeveus" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=model-hunter-dev.tfstate"

      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan \
            -var-file="env/dev.tfvars"

  # ── PowerShell Security Scan (PSScriptAnalyzer) ──
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path ./src -Recurse -Severity Warning,Error
          $results | Format-Table -AutoSize
          if ($results | Where-Object { $_.Severity -eq 'Error' }) {
            throw "PSScriptAnalyzer found errors."
          }

  # ── Terraform Security Scan ──
  tfsec:
    name: Terraform Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true
